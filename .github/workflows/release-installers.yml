name: Release Installers

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  windows:
    name: Windows NSIS installer
    runs-on: windows-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build NSIS installer
        shell: pwsh
        run: npx tauri build --bundles nsis --no-sign

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: src-tauri/target/release/bundle/nsis/*.exe

  macos:
    name: macOS ${{ matrix.arch }} DMG
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            target: aarch64-apple-darwin
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build DMG
        run: npx tauri build --bundles dmg --target ${{ matrix.target }} --no-sign

      - name: Upload macOS DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
